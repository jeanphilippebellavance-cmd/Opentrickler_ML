name: Firmware Build

run-name: Firmware build for ${{ github.ref_name }} by @${{ github.actor }}

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Pico 2 W / RP2350 Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-newlib \
            ninja-build \
            python3

      - name: Configure
        run: |
          cmake -B "${{ github.workspace }}/build-pico2_w" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPICO_BOARD=pico2_w

      - name: Build
        run: cmake --build "${{ github.workspace }}/build-pico2_w" --config Release

      - name: Upload firmware outputs
        uses: actions/upload-artifact@v7
        with:
          name: opentrickler-pico2_w-rp2350-release
          if-no-files-found: error
          path: |
            src/generated/version.c
            build-pico2_w/*.bin
            build-pico2_w/*.elf
            build-pico2_w/*.hex
            build-pico2_w/*.uf2
